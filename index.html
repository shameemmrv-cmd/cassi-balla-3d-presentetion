<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Bella Interiors | Premium Architectural Presentation</title>
    <meta name="description" content="Casa Bella Interiors - High-end interior design and architectural presentation. Explore our interactive ground floor plan and luxury perspective views.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Video Section (Intro) -->
    <section class="section hero" id="hero">
        <video class="hero-video" autoplay loop muted playsinline>
            <source src="assets/hero_video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-interactive-group">
                <p class="hero-subtitle">INTERIORS & ARCHITECTURE</p>
                <button class="btn btn-hero-gallery btn-gallery-trigger">View All Images</button>
            </div>
        </div>
        <a href="#intro" class="scroll-arrow-down" id="toIntro">
            <span></span>
        </a>
    </section>

    <!-- New Section 1.5: Watermark Intro -->
    <section class="section watermark-section" id="intro">
        <div class="watermark-text">CASA BELLA</div>
        <a href="#plan" class="scroll-arrow-down dark">
            <span></span>
        </a>
    </section>

    <!-- Section 1: Interactive Plan (Plan) -->
    <section class="section plan-section" id="plan">
        <div class="container">
            <div class="section-header">
                <h2>Floor Plan Interaction</h2>
                <p>Select a camera position to view the professional interior render</p>
            </div>

            <div class="plan-interactive-container">
                <div class="plan-wrapper">
                    <img src="image/cemara refrence 3.jpg" alt="Ground Floor Plan" class="plan-img">
                    
                    <!-- 18 Camera Hotspots from Reference 3 (Perfect Alignment) -->
                    <div class="camera-marker" style="top: 67.5%; left: 50.5%;" data-camera="1">1</div>
                    <div class="camera-marker" style="top: 80.8%; left: 32.3%;" data-camera="2">2</div>
                    <div class="camera-marker" style="top: 91.6%; left: 24.0%;" data-camera="3">3</div>
                    <div class="camera-marker" style="top: 31.8%; left: 40.7%;" data-camera="4">4</div>
                    <div class="camera-marker" style="top: 36.2%; left: 36.4%;" data-camera="5">5</div>
                    <div class="camera-marker" style="top: 43.5%; left: 54.5%;" data-camera="6">6</div>
                    <div class="camera-marker" style="top: 60.8%; left: 71.0%;" data-camera="7">7</div>
                    <div class="camera-marker" style="top: 60.1%; left: 52.0%;" data-camera="8">8</div>
                    <div class="camera-marker" style="top: 84.3%; left: 81.3%;" data-camera="9">9</div>
                    <div class="camera-marker" style="top: 51.2%; left: 35.1%;" data-camera="10">10</div>
                    <div class="camera-marker" style="top: 78.5%; left: 67.2%;" data-camera="11">11</div>
                    <div class="camera-marker" style="top: 18.7%; left: 37.6%;" data-camera="12">12</div>
                    <div class="camera-marker" style="top: 9.4%; left: 31.3%;" data-camera="13">13</div>
                    <div class="camera-marker" style="top: 12.8%; left: 60.9%;" data-camera="14">14</div>
                    <div class="camera-marker" style="top: 36.9%; left: 44.5%;" data-camera="15">15</div>
                    <div class="camera-marker" style="top: 57.3%; left: 25.8%;" data-camera="16">16</div>
                    <div class="camera-marker" style="top: 20.2%; left: 57.1%;" data-camera="17">17</div>
                    <div class="camera-marker" style="top: 7.4%; left: 59.1%;" data-camera="18">18</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery / Perspective Modal -->
    <div class="perspective-modal" id="galleryModal">
        <span class="close-modal" id="closeGallery">&times;</span>
        <div class="modal-content">
            <div class="gallery-nav prev" id="prevBtn">&#10094;</div>
            <div class="image-stage">
                <img src="" alt="Render View" class="modal-img" id="galleryImg">
            </div>
            <div class="gallery-nav next" id="nextBtn">&#10095;</div>
            
            <div class="modal-info">
                <h3 id="galleryTitle">Render View</h3>
                <p id="galleryCounter">1 / 18</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
